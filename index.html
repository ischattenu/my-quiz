<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 금융투자분석사 문제은행</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 700px;
    width: 100%;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 20px 30px;
  }
  .header h1 { font-size: 18px; margin-bottom: 8px; }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fbbf24;
    transition: width 0.3s;
  }
  .stats {
    display: flex;
    gap: 15px;
    font-size: 13px;
    margin-top: 10px;
  }
  .card { padding: 30px; min-height: 300px; }
  .question-num {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 15px;
  }
  .question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 25px;
    color: #1f2937;
    white-space: pre-wrap;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    padding: 15px 18px;
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    width: 100%;
  }
  .choice:hover:not(:disabled) {
    background: #eff6ff;
    border-color: #3b82f6;
    transform: translateX(4px);
  }
  .choice-label {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .choice.correct {
    background: #d1fae5;
    border-color: #10b981;
    color: #065f46;
  }
  .choice.correct .choice-label { background: #10b981; color: white; }
  .choice.wrong {
    background: #fee2e2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .choice.wrong .choice-label { background: #ef4444; color: white; }
  .choice:disabled { cursor: not-allowed; }
  .explanation {
    margin-top: 20px;
    padding: 20px;
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    color: #78350f;
    display: none;
    white-space: pre-wrap;
  }
  .explanation.show { display: block; animation: slideDown 0.3s; }
  .explanation strong { color: #92400e; display: block; margin-bottom: 8px; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .controls {
    display: flex;
    gap: 10px;
    padding: 20px 30px;
    background: #f9fafb;
    border-top: 1px solid #e5e7eb;
  }
  button.nav {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-next { background: #4f46e5; color: white; }
  .btn-next:hover:not(:disabled) { background: #4338ca; }
  .btn-next:disabled {
    background: #d1d5db;
    color: #9ca3af;
    cursor: not-allowed;
  }
  .result {
    padding: 40px 30px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result h2 { font-size: 24px; margin-bottom: 20px; }
  .score {
    font-size: 48px;
    font-weight: 800;
    color: #4f46e5;
    margin: 20px 0;
  }
  .mode-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    padding: 10px 20px;
    border: 2px solid #4f46e5;
    background: white;
    color: #4f46e5;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
  }
  .mode-btn:hover { background: #4f46e5; color: white; }
  .loading, .error-box {
    padding: 40px 30px;
    text-align: center;
    color: #6b7280;
  }
  .error-box {
    background: #fee2e2;
    color: #991b1b;
    margin: 20px;
    border-radius: 8px;
  }
  .debug {
    padding: 15px;
    font-size: 12px;
    color: #6b7280;
    border-top: 1px solid #e5e7eb;
    background: #f9fafb;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="quizTitle">📚 문제은행</h1>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="stats">
      <span id="progressText">로딩 중...</span>
      <span>✅ <span id="correctCount">0</span></span>
      <span>❌ <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div id="loadingView" class="loading">
    <p>📂 문제 파일을 불러오는 중...</p>
  </div>

  <div class="card" id="quizCard" style="display:none;">
    <span class="question-num" id="questionNum">문제 1</span>
    <div class="question" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <div class="result" id="resultCard">
    <h2>🎉 퀴즈 완료!</h2>
    <div class="score"><span id="finalScore">0</span> / <span id="totalQuestions">0</span></div>
    <p id="resultMessage">수고하셨습니다!</p>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="restart()">🔄 다시 풀기 (랜덤)</button>
      <button class="mode-btn" onclick="reviewWrong()">❌ 틀린 문제만</button>
    </div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button class="nav btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
      답을 선택하세요
    </button>
  </div>

  <div id="debug" class="debug" style="display:none;"></div>
</div>

<script>
// =====================================================
const QUIZ_FILE = 'quiz.txt';
// =====================================================

// ===== 강력한 파서 =====
function parseQuizText(text) {
  // 원문자 → 알파벳/숫자 매핑
  const CIRCLE_TO_IDX = {
    '①':0, '②':1, '③':2, '④':3, '⑤':4,
    'A':0, 'B':1, 'C':2, 'D':3, 'E':4,
    '1':0, '2':1, '3':2, '4':3, '5':4
  };
  
  const result = { title: '문제은행', questions: [], parseLog: [] };
  
  // 제목 추출
  const titleMatch = text.match(/^#\s+(.+)$/m);
  if (titleMatch) result.title = titleMatch[1].replace(/[#📊💰📈⚖️📝]/g, '').trim();
  
  // 문제 영역과 해설 영역 분리
  // "해설" 또는 "정답 및 해설" 섹션을 기준으로 분리
  let problemSection = text;
  let explanationSection = '';
  
  const expSectionMatch = text.match(/(?:^|\n)#+\s*(?:📝\s*)?(?:정답\s*(?:및|과)?\s*)?해설[^\n]*\n([\s\S]*)/);
  if (expSectionMatch) {
    problemSection = text.substring(0, expSectionMatch.index);
    explanationSection = expSectionMatch[1];
  }
  
  // ===== 1. 문제 파싱 =====
  // 문제 시작 패턴: **1.** / **1번.** / **1번)** / **문제 1.** / **문제 1)** 등
  const qStartRegex = /\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*[.)]\s*\*\*|\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*[.)]?\s*([^\n*]*)\*\*/g;
  
  // 더 간단한 접근: 줄 단위로 파싱
  const lines = problemSection.split('\n');
  const questions = [];
  let current = null;
  let setIndex = 0;  // 여러 세트가 섞였을 때 구분용
  let prevNum = 0;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    
    // 문제 시작 인식 (**N.** **N번.** **N)** **N번)** **문제 N.** 등)
    const qMatch = line.match(/^\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*[.)]\s*(.*?)\*\*\s*(.*)$/) ||
                   line.match(/^\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*[.)]?\s*\*\*\s*(.+)$/);
    
    if (qMatch) {
      // 이전 문제 저장
      if (current) questions.push(current);
      
      const num = parseInt(qMatch[1]);
      // 번호가 역행하면 새 세트로 인식
      if (num <= prevNum && prevNum >= 15) {
        setIndex++;
      }
      prevNum = num;
      
      // 질문 텍스트 추출
      let qText = (qMatch[2] || '') + (qMatch[3] ? ' ' + qMatch[3] : '');
      qText = qText.replace(/^\*+|\*+$/g, '').trim();
      
      current = {
        setIndex,
        num,
        uniqueKey: `${setIndex}-${num}`,
        question: qText,
        choices: [],
        choiceMarkers: [],  // ①②③④ 또는 1234 저장
        answer: -1,
        explanation: ''
      };
      continue;
    }
    
    // 보기 인식
    if (current) {
      // 형식: - ① xxx / ① xxx / 1. xxx / 1) xxx / A) xxx
      let cMatch = line.match(/^[-•]?\s*([①②③④⑤])\s*(.+)$/);
      if (!cMatch) cMatch = line.match(/^([1-5])[.)]\s*(.+)$/);
      if (!cMatch) cMatch = line.match(/^([A-E])\)\s*(.+)$/i);
      
      if (cMatch) {
        const marker = cMatch[1];
        const idx = CIRCLE_TO_IDX[marker.toUpperCase()];
        if (idx !== undefined && idx < 5) {
          current.choiceMarkers.push(marker);
          current.choices[idx] = cMatch[2].trim();
        }
        continue;
      }
      
      // 문제문 이어지기 (보기가 아직 안나왔을 때)
      if (current.choices.length === 0 && line && !line.startsWith('#') && !line.startsWith('---')) {
        current.question += (current.question ? ' ' : '') + line;
      }
    }
  }
  if (current) questions.push(current);
  
  // ===== 2. 해설 파싱 =====
  // 해설에서 정답 추출: "**1번 정답: ②**" / "**문제 1 정답: ①**" / "**1. ②**" 등
  const explanations = {};
  const answers = {};
  
  const expLines = explanationSection.split('\n');
  let currentExp = null;
  let expSetIdx = 0;
  let prevExpNum = 0;
  
  for (let i = 0; i < expLines.length; i++) {
    const line = expLines[i].trim();
    
    // 해설/정답 시작 패턴
    const patterns = [
      /^\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*(?:정답|해설)?\s*[:：.)]?\s*([①②③④⑤1-5A-Ea-e]+)?\s*\*\*/,  // **1번 정답: ②**
      /^\*\*\s*(\d+)\s*(?:번)?\s*정답\s*[:：]?\s*([①②③④⑤1-5A-Ea-e]+)\s*\*\*/,
      /^\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*\.\s*정답\s*[:：]?\s*([①②③④⑤1-5A-Ea-e]+)\s*\*\*/,
      /^\*\*\s*(?:문제\s*)?(\d+)\s*(?:번)?\s*해설\s*[:：]?\s*\*\*/,
    ];
    
    let matched = null;
    for (const p of patterns) {
      const m = line.match(p);
      if (m) { matched = m; break; }
    }
    
    if (matched) {
      // 이전 해설 저장
      if (currentExp) {
        explanations[currentExp.uniqueKey] = currentExp.text.trim();
      }
      
      const num = parseInt(matched[1]);
      if (num <= prevExpNum && prevExpNum >= 15) {
        expSetIdx++;
      }
      prevExpNum = num;
      
      const uniqueKey = `${expSetIdx}-${num}`;
      const ansMark = matched[2];
      if (ansMark) {
        // 첫 번째 표시만 사용 (복수정답인 경우 첫번째만)
        const firstChar = ansMark.charAt(0).toUpperCase();
        const idx = {
          '①':0,'②':1,'③':2,'④':3,'⑤':4,
          '1':0,'2':1,'3':2,'4':3,'5':4,
          'A':0,'B':1,'C':2,'D':3,'E':4
        }[firstChar];
        if (idx !== undefined) answers[uniqueKey] = idx;
      }
      
      currentExp = { uniqueKey, text: '' };
      continue;
    }
    
    // 해설 본문 누적
    if (currentExp && line && !line.startsWith('#') && !line.startsWith('---') && !line.startsWith('===')) {
      currentExp.text += (currentExp.text ? '\n' : '') + line;
    }
  }
  if (currentExp) explanations[currentExp.uniqueKey] = currentExp.text.trim();
  
  // ===== 3. 문제와 해설 매칭 =====
  const validQuestions = [];
  questions.forEach(q => {
    // 정답 매칭
    if (answers[q.uniqueKey] !== undefined) {
      q.answer = answers[q.uniqueKey];
    }
    // 해설 매칭
    if (explanations[q.uniqueKey]) {
      q.explanation = explanations[q.uniqueKey];
    } else {
      q.explanation = '해설이 없습니다.';
    }
    
    // 유효성 검사: 보기 2개 이상, 정답이 있어야 함
    const validChoices = q.choices.filter(c => c);
    if (validChoices.length >= 2 && q.answer >= 0 && q.answer < q.choices.length && q.choices[q.answer]) {
      // 빈 보기 제거하고 인덱스 재조정은 하지 않음 (marker 기반이므로)
      // 하지만 보기가 빈 칸이면 제거하고 정답 인덱스도 조정
      const compactChoices = [];
      let newAnswer = -1;
      q.choices.forEach((c, i) => {
        if (c) {
          if (i === q.answer) newAnswer = compactChoices.length;
          compactChoices.push(c);
        }
      });
      q.choices = compactChoices;
      q.answer = newAnswer;
      
      if (newAnswer >= 0) {
        validQuestions.push(q);
      }
    }
  });
  
  result.questions = validQuestions;
  result.parseLog.push(`총 인식된 문제: ${questions.length}개`);
  result.parseLog.push(`유효한 문제: ${validQuestions.length}개`);
  result.parseLog.push(`정답 인식: ${Object.keys(answers).length}개`);
  result.parseLog.push(`해설 인식: ${Object.keys(explanations).length}개`);
  
  return result;
}

// ===== 배열 섞기 =====
function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

// ===== 상태 =====
let allQuestions = [];
let questions = [];
let currentIdx = 0;
let userAnswers = [];
let correctCount = 0;
let wrongCount = 0;
let answered = false;

async function loadQuiz() {
  try {
    const response = await fetch(QUIZ_FILE + '?t=' + Date.now());
    if (!response.ok) throw new Error(`파일을 불러올 수 없습니다 (${response.status})`);
    
    const text = await response.text();
    const data = parseQuizText(text);
    
    // 디버그 정보 표시
    const debugEl = document.getElementById('debug');
    debugEl.style.display = 'block';
    debugEl.innerHTML = '🔧 ' + data.parseLog.join(' | ');
    
    if (data.questions.length === 0) {
      throw new Error('문제를 파싱하지 못했습니다.\n\n' + data.parseLog.join('\n'));
    }
    
    allQuestions = data.questions;
    document.getElementById('quizTitle').textContent = `📚 ${data.title} (${data.questions.length}문제)`;
    
    startQuiz(allQuestions);
  } catch (err) {
    document.getElementById('loadingView').innerHTML = 
      `<div class="error-box">❌ ${err.message}<br><br>
      <small>quiz.txt가 같은 폴더에 있는지 확인하세요.<br>
      (로컬에서 열 때는 Live Server를 사용하세요)</small></div>`;
  }
}

function startQuiz(qList) {
  questions = shuffleArray(qList);
  currentIdx = 0;
  userAnswers = [];
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('resultCard').classList.remove('show');
  
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentIdx];
  answered = false;
  
  document.getElementById('questionNum').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = 
    `${((currentIdx + 1) / questions.length) * 100}%`;

  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';
  const labels = ['①', '②', '③', '④', '⑤'];
  
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-label">${labels[idx]}</span><span>${choice}</span>`;
    btn.onclick = () => selectAnswer(idx);
    container.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('show');
  
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = true;
  nextBtn.textContent = '답을 선택하세요';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  
  const q = questions[currentIdx];
  userAnswers[currentIdx] = idx;
  
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  
  if (idx === q.answer) correctCount++;
  else wrongCount++;
  
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  
  const labels = ['①', '②', '③', '④', '⑤'];
  const exp = document.getElementById('explanation');
  const isCorrect = idx === q.answer;
  const header = isCorrect 
    ? '✅ 정답입니다!' 
    : `❌ 오답입니다. 정답은 ${labels[q.answer]}번입니다.`;
  
  exp.innerHTML = `<strong>${header}</strong>📖 해설\n\n${q.explanation}`;
  exp.classList.add('show');
  
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  nextBtn.textContent = currentIdx === questions.length - 1 ? '🏁 결과 보기' : '다음 문제 →';
}

function nextQuestion() {
  if (!answered) return;
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('finalScore').textContent = correctCount;
  document.getElementById('totalQuestions').textContent = questions.length;
  
  const rate = (correctCount / questions.length * 100).toFixed(0);
  let msg = '';
  if (rate >= 90) msg = '🏆 훌륭합니다!';
  else if (rate >= 70) msg = '👍 잘하셨어요!';
  else if (rate >= 50) msg = '💪 절반은 넘었어요.';
  else msg = '📚 더 학습이 필요합니다.';
  document.getElementById('resultMessage').textContent = `정답률 ${rate}% - ${msg}`;
}

function restart() {
  startQuiz(allQuestions);
}

function reviewWrong() {
  const wrongQs = [];
  questions.forEach((q, i) => {
    if (userAnswers[i] !== q.answer) wrongQs.push(q);
  });
  
  if (wrongQs.length === 0) {
    alert('🎉 틀린 문제가 없습니다!');
    return;
  }
  startQuiz(wrongQs);
}

loadQuiz();
</script>
</body>
</html>
