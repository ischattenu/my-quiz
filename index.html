<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 금융투자분석사 문제은행</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 700px;
    width: 100%;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 20px 30px;
  }
  .header h1 { font-size: 18px; margin-bottom: 8px; }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fbbf24;
    transition: width 0.3s;
  }
  .stats {
    display: flex;
    gap: 15px;
    font-size: 13px;
    margin-top: 10px;
  }
  .card { padding: 30px; min-height: 300px; }
  .question-num {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 15px;
  }
  .question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 25px;
    color: #1f2937;
    white-space: pre-wrap;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    padding: 15px 18px;
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    width: 100%;
  }
  .choice:hover:not(:disabled) {
    background: #eff6ff;
    border-color: #3b82f6;
    transform: translateX(4px);
  }
  .choice-label {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .choice.correct {
    background: #d1fae5;
    border-color: #10b981;
    color: #065f46;
  }
  .choice.correct .choice-label { background: #10b981; color: white; }
  .choice.wrong {
    background: #fee2e2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .choice.wrong .choice-label { background: #ef4444; color: white; }
  .choice:disabled { cursor: not-allowed; }
  .explanation {
    margin-top: 20px;
    padding: 20px;
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    color: #78350f;
    display: none;
    white-space: pre-wrap;
  }
  .explanation.show { display: block; animation: slideDown 0.3s; }
  .explanation strong { color: #92400e; display: block; margin-bottom: 8px; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .controls {
    display: flex;
    gap: 10px;
    padding: 20px 30px;
    background: #f9fafb;
    border-top: 1px solid #e5e7eb;
  }
  button.nav {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-next {
    background: #4f46e5;
    color: white;
  }
  .btn-next:hover { background: #4338ca; }
  .btn-next:disabled {
    background: #d1d5db;
    color: #9ca3af;
    cursor: not-allowed;
  }
  .result {
    padding: 40px 30px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result h2 { font-size: 24px; margin-bottom: 20px; }
  .score {
    font-size: 48px;
    font-weight: 800;
    color: #4f46e5;
    margin: 20px 0;
  }
  .mode-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    padding: 10px 20px;
    border: 2px solid #4f46e5;
    background: white;
    color: #4f46e5;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
  }
  .mode-btn:hover { background: #4f46e5; color: white; }
  .loading {
    padding: 60px 30px;
    text-align: center;
    color: #6b7280;
  }
  .error {
    padding: 30px;
    background: #fee2e2;
    color: #991b1b;
    border-radius: 8px;
    margin: 20px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="quizTitle">📚 문제은행</h1>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="stats">
      <span id="progressText">로딩 중...</span>
      <span>✅ <span id="correctCount">0</span></span>
      <span>❌ <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div id="loadingView" class="loading">
    <p>📂 문제 파일을 불러오는 중...</p>
  </div>

  <div class="card" id="quizCard" style="display:none;">
    <span class="question-num" id="questionNum">문제 1</span>
    <div class="question" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <div class="result" id="resultCard">
    <h2>🎉 퀴즈 완료!</h2>
    <div class="score"><span id="finalScore">0</span> / <span id="totalQuestions">0</span></div>
    <p id="resultMessage">수고하셨습니다!</p>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="restart()">🔄 다시 풀기 (랜덤)</button>
      <button class="mode-btn" onclick="reviewWrong()">❌ 틀린 문제만</button>
    </div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button class="nav btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
      답을 선택하세요
    </button>
  </div>
</div>

<script>
// =====================================================
// ⭐ 설정: 읽어올 텍스트 파일명 (같은 폴더에 두기)
// =====================================================
const QUIZ_FILE = 'quiz.txt';
// =====================================================

let allQuestions = [];
let questions = [];
let currentIdx = 0;
let userAnswers = [];
let correctCount = 0;
let wrongCount = 0;
let answered = false;

// 텍스트 파일 파싱 함수
function parseQuizText(text) {
  const result = { title: '문제은행', questions: [] };
  
  // 제목 추출
  const titleMatch = text.match(/^#\s+(.+)$/m);
  if (titleMatch) result.title = titleMatch[1].trim();
  
  // 문제 파싱
  const qRegex = /\*\*문제\s*(\d+)\*\*\s*\n([\s\S]*?)\*\*정답:\s*([A-D])\*\*/g;
  const questions = {};
  let match;
  
  while ((match = qRegex.exec(text)) !== null) {
    const num = parseInt(match[1]);
    const block = match[2].trim();
    const answer = match[3].trim().toUpperCase();
    
    const lines = block.split('\n').map(l => l.trim()).filter(l => l);
    
    // 보기와 질문 분리
    const choiceLines = [];
    const questionLines = [];
    let foundChoice = false;
    
    for (const line of lines) {
      if (/^[A-D]\)/i.test(line)) {
        foundChoice = true;
        choiceLines.push(line.replace(/^[A-D]\)\s*/i, ''));
      } else if (!foundChoice) {
        questionLines.push(line);
      }
    }
    
    questions[num] = {
      num: num,
      question: questionLines.join('\n'),
      choices: choiceLines,
      answer: ['A','B','C','D'].indexOf(answer),
      explanation: '해설이 없습니다.'
    };
  }
  
  // 해설 파싱
  const eRegex = /\*\*문제\s*(\d+)\s*해설:\*\*\s*\n([\s\S]*?)(?=\n\*\*문제\s*\d+\s*해설:|\n#|\Z)/g;
  while ((match = eRegex.exec(text)) !== null) {
    const num = parseInt(match[1]);
    if (questions[num]) {
      questions[num].explanation = match[2].trim();
    }
  }
  
  result.questions = Object.values(questions).sort((a, b) => a.num - b.num);
  return result;
}

// 배열 섞기 (Fisher-Yates)
function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

// 파일 로딩
async function loadQuiz() {
  try {
    const response = await fetch(QUIZ_FILE);
    if (!response.ok) throw new Error(`파일을 불러올 수 없습니다 (${response.status})`);
    
    const text = await response.text();
    const data = parseQuizText(text);
    
    if (data.questions.length === 0) {
      throw new Error('문제를 파싱하지 못했습니다. 파일 형식을 확인하세요.');
    }
    
    allQuestions = data.questions;
    document.getElementById('quizTitle').textContent = `📚 ${data.title}`;
    
    startQuiz(allQuestions);
  } catch (err) {
    document.getElementById('loadingView').innerHTML = 
      `<div class="error">❌ ${err.message}<br><br>
      <small>quiz.txt 파일이 같은 폴더에 있는지 확인하세요.</small></div>`;
  }
}

function startQuiz(qList) {
  questions = shuffleArray(qList);  // 🎲 랜덤 섞기
  currentIdx = 0;
  userAnswers = [];
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('resultCard').classList.remove('show');
  
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentIdx];
  answered = false;
  
  document.getElementById('questionNum').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = 
    `${((currentIdx + 1) / questions.length) * 100}%`;

  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-label">${labels[idx]}</span><span>${choice}</span>`;
    btn.onclick = () => selectAnswer(idx);
    container.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('show');
  
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = true;
  nextBtn.textContent = '답을 선택하세요';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  
  const q = questions[currentIdx];
  userAnswers[currentIdx] = idx;
  
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  
  if (idx === q.answer) {
    correctCount++;
  } else {
    wrongCount++;
  }
  
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  
  // 해설 표시
  const exp = document.getElementById('explanation');
  const isCorrect = idx === q.answer;
  exp.innerHTML = `<strong>${isCorrect ? '✅ 정답입니다!' : '❌ 오답입니다. 정답은 ' + labels(q.answer) + '입니다.'}</strong>📖 해설\n\n${q.explanation}`;
  exp.classList.add('show');
  
  // 다음 버튼 활성화
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  nextBtn.textContent = currentIdx === questions.length - 1 ? '🏁 결과 보기' : '다음 문제 →';
}

function labels(idx) {
  return ['A', 'B', 'C', 'D'][idx];
}

function nextQuestion() {
  if (!answered) return;
  
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('finalScore').textContent = correctCount;
  document.getElementById('totalQuestions').textContent = questions.length;
  
  const rate = (correctCount / questions.length * 100).toFixed(0);
  let msg = '';
  if (rate >= 90) msg = '🏆 훌륭합니다! 완벽에 가까워요!';
  else if (rate >= 70) msg = '👍 잘하셨어요! 조금만 더!';
  else if (rate >= 50) msg = '💪 절반은 넘었어요. 복습하세요!';
  else msg = '📚 더 학습이 필요합니다.';
  document.getElementById('resultMessage').textContent = `정답률 ${rate}% - ${msg}`;
}

function restart() {
  startQuiz(allQuestions);
}

function reviewWrong() {
  const wrongQs = [];
  questions.forEach((q, i) => {
    if (userAnswers[i] !== q.answer) wrongQs.push(q);
  });
  
  if (wrongQs.length === 0) {
    alert('🎉 틀린 문제가 없습니다!');
    return;
  }
  startQuiz(wrongQs);
}

// 시작
loadQuiz();
</script>
</body>
</html>
