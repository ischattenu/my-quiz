<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 금융투자분석사 문제은행</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 700px;
    width: 100%;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 20px 30px;
  }
  .header h1 { font-size: 18px; margin-bottom: 8px; }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fbbf24;
    transition: width 0.3s;
  }
  .stats {
    display: flex;
    gap: 15px;
    font-size: 13px;
    margin-top: 10px;
  }
  .card { padding: 30px; }
  .question-num {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 15px;
  }
  .question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 25px;
    color: #1f2937;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    padding: 15px 18px;
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .choice:hover:not(:disabled) {
    background: #eff6ff;
    border-color: #3b82f6;
    transform: translateX(4px);
  }
  .choice-label {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .choice.correct {
    background: #d1fae5;
    border-color: #10b981;
    color: #065f46;
  }
  .choice.correct .choice-label { background: #10b981; color: white; }
  .choice.wrong {
    background: #fee2e2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .choice.wrong .choice-label { background: #ef4444; color: white; }
  .choice:disabled { cursor: not-allowed; }
  .explanation {
    margin-top: 20px;
    padding: 20px;
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    color: #78350f;
    display: none;
  }
  .explanation.show { display: block; animation: slideDown 0.3s; }
  .explanation strong { color: #92400e; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .controls {
    display: flex;
    gap: 10px;
    padding: 20px 30px;
    background: #f9fafb;
    border-top: 1px solid #e5e7eb;
  }
  button.nav {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-prev { background: #e5e7eb; color: #374151; }
  .btn-prev:hover { background: #d1d5db; }
  .btn-next { background: #4f46e5; color: white; }
  .btn-next:hover { background: #4338ca; }
  .btn-next:disabled, .btn-prev:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .result {
    padding: 40px 30px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result h2 { font-size: 24px; margin-bottom: 20px; }
  .score {
    font-size: 48px;
    font-weight: 800;
    color: #4f46e5;
    margin: 20px 0;
  }
  .mode-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    padding: 10px 20px;
    border: 2px solid #4f46e5;
    background: white;
    color: #4f46e5;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  .mode-btn:hover { background: #4f46e5; color: white; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="quizTitle">📚 금융투자분석사 문제은행</h1>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="stats">
      <span id="progressText">1 / 10</span>
      <span>✅ <span id="correctCount">0</span></span>
      <span>❌ <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div class="card" id="quizCard">
    <span class="question-num" id="questionNum">문제 1</span>
    <div class="question" id="questionText">로딩 중...</div>
    <div class="choices" id="choicesContainer"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <div class="result" id="resultCard">
    <h2>🎉 퀴즈 완료!</h2>
    <div class="score"><span id="finalScore">0</span> / <span id="totalQuestions">0</span></div>
    <p id="resultMessage">수고하셨습니다!</p>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="restart()">🔄 다시 풀기</button>
      <button class="mode-btn" onclick="reviewWrong()">❌ 틀린 문제만</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="nav btn-prev" id="prevBtn" onclick="prevQuestion()">← 이전</button>
    <button class="nav btn-next" id="nextBtn" onclick="nextQuestion()">다음 →</button>
  </div>
</div>

<script>
// ====================================================
// ⭐ 여기에 문제 데이터를 넣으세요 (JSON 형식)
// ====================================================
const QUIZ_DATA = {
  "title": "📚 금융투자분석사 시험 문제",
  "questions": [
    {
      "num": 1,
      "question": "효율적 시장가설(EMH)의 세 가지 형태 중 준강형 효율적 시장에 대한 설명으로 옳은 것은?",
      "choices": [
        "과거 가격 정보만 반영되어 있다",
        "공개된 모든 정보가 반영되어 있다",
        "내부자 정보를 포함한 모든 정보가 반영되어 있다",
        "미래 정보까지 반영되어 있다",
        "시장수익률이 1% 상승하면 해당 주식은 1.5% 상승한다",
        "시장수익률이 1% 상승하면 해당 주식은 0.5% 상승한다",
        "해당 주식의 위험이 시장평균보다 50% 높다",
        "해당 주식의 수익률이 시장평균보다 50% 높다",
        "CAPM보다 현실적인 가정을 사용한다",
        "다수의 체계적 위험요인을 고려한다",
        "무위험차익거래 기회가 존재하지 않는다고 가정한다",
        "투자자의 효용함수를 반드시 알아야 한다",
        "20,000원",
        "21,000원",
        "10,000원",
        "10,500원",
        "500원",
        "2,000원",
        "50,000원",
        "500,000원",
        "배당금",
        "세후순이자비용",
        "우선주배당",
        "보통주배당",
        "30%",
        "40%",
        "60%",
        "80%",
        "순이익률",
        "총자산회전율",
        "재고자산회전율",
        "재무레버리지",
        "3억원",
        "5억원",
        "7억원",
        "10억원",
        "국가",
        "한국은행",
        "10억원 이상 금융투자상품 보유한 개인",
        "5억원 이상 금융투자상품 보유한 개인",
        "고객보다 회사의 이익을 우선한다",
        "고객의 이익을 최우선으로 한다",
        "회사와 고객의 이익을 동등하게 고려한다",
        "분석사 개인의 이익을 최우선으로 한다",
        "상장법인의 임원",
        "상장법인의 주요주주",
        "상장법인 주식을 보유한 일반 투자자",
        "상장법인과 계약 체결한 자"
      ],
      "answer": 2,
      "explanation": "효율적 시장가설의 준강형(Semi-strong form)은 공개된 모든 정보(과거 가격 정보, 재무제표, 공시자료 등)가 주가에 즉시 반영되어 있다는 이론입니다. 약형은 과거 가격정보만, 강형은 내부자정보까지 포함됩니다."
    }
  ]
};
// ====================================================

let currentIdx = 0;
let userAnswers = [];
let questions = QUIZ_DATA.questions;
let correctCount = 0;
let wrongCount = 0;

document.getElementById('quizTitle').textContent = QUIZ_DATA.title;

function loadQuestion() {
  const q = questions[currentIdx];
  document.getElementById('questionNum').textContent = `문제 ${q.num}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;

  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-label">${labels[idx]}</span><span>${choice}</span>`;
    btn.onclick = () => selectAnswer(idx);
    
    // 이미 답했으면 상태 복원
    if (userAnswers[currentIdx] !== undefined) {
      btn.disabled = true;
      const selected = userAnswers[currentIdx];
      if (idx === q.answer) btn.classList.add('correct');
      else if (idx === selected) btn.classList.add('wrong');
    }
    container.appendChild(btn);
  });

  const exp = document.getElementById('explanation');
  if (userAnswers[currentIdx] !== undefined) {
    exp.innerHTML = `<strong>📖 해설</strong><br><br>${q.explanation}`;
    exp.classList.add('show');
  } else {
    exp.classList.remove('show');
  }

  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').textContent = 
    currentIdx === questions.length - 1 ? '결과 보기 🏁' : '다음 →';
}

function selectAnswer(idx) {
  if (userAnswers[currentIdx] !== undefined) return;
  
  userAnswers[currentIdx] = idx;
  const q = questions[currentIdx];
  
  if (idx === q.answer) correctCount++;
  else wrongCount++;
  
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  
  loadQuestion();
}

function nextQuestion() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('finalScore').textContent = correctCount;
  document.getElementById('totalQuestions').textContent = questions.length;
  
  const rate = (correctCount / questions.length * 100).toFixed(0);
  let msg = '';
  if (rate >= 90) msg = '🏆 훌륭합니다! 완벽에 가까워요!';
  else if (rate >= 70) msg = '👍 잘하셨어요! 조금만 더!';
  else if (rate >= 50) msg = '💪 절반은 넘었어요. 복습하세요!';
  else msg = '📚 더 학습이 필요합니다.';
  document.getElementById('resultMessage').textContent = `정답률 ${rate}% - ${msg}`;
}

function restart() {
  currentIdx = 0;
  userAnswers = [];
  correctCount = 0;
  wrongCount = 0;
  questions = QUIZ_DATA.questions;
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('resultCard').classList.remove('show');
  loadQuestion();
}

function reviewWrong() {
  const wrong = QUIZ_DATA.questions.filter((q, i) => userAnswers[i] !== q.answer);
  if (wrong.length === 0) {
    alert('🎉 틀린 문제가 없습니다!');
    return;
  }
  questions = wrong;
  currentIdx = 0;
  userAnswers = [];
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('resultCard').classList.remove('show');
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
